<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Find My Steam Deck</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      --accent: #38bdf8; --accent-ink: #0a1420;
      --lost: #f0b429; --stolen: #f2585b; --normal: #34d399;
      --glass: rgba(17, 24, 38, 0.72); --glass-brd: rgba(255, 255, 255, 0.10);
      --ink: #eef2f7; --ink-dim: rgba(238, 242, 247, 0.62); --ink-faint: rgba(238, 242, 247, 0.40);
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; }
    body {
      font: 14px/1.55 -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: var(--ink); background: #0a0f18;
    }
    #map { position: fixed; inset: 0; z-index: 0; background: #0a0f18; }
    .leaflet-container { background: #0a0f18 !important; font: inherit; }
    .leaflet-control-attribution { background: rgba(10,15,24,.6) !important; color: var(--ink-faint) !important; }
    .leaflet-control-attribution a { color: var(--ink-dim) !important; }
    .leaflet-bar a { background: var(--glass) !important; color: var(--ink) !important; border-color: var(--glass-brd) !important; }

    /* floating layer */
    .layer { position: fixed; z-index: 10; }
    .tl { top: 16px; left: 16px; } .tr { top: 16px; right: 16px; }
    .bl { bottom: 16px; left: 16px; } .br { bottom: 16px; right: 16px; }

    .glass {
      background: var(--glass); backdrop-filter: blur(18px) saturate(1.3);
      -webkit-backdrop-filter: blur(18px) saturate(1.3);
      border: 1px solid var(--glass-brd); border-radius: 16px; box-shadow: var(--shadow);
    }
    .pad { padding: 14px 16px; }

    .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 18px; letter-spacing: .2px; }
    .brand .logo { font-size: 24px; }

    .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .col { display: flex; flex-direction: column; gap: 10px; }
    .muted { color: var(--ink-dim); } .faint { color: var(--ink-faint); font-size: 11px; }

    button, .btn {
      font: inherit; font-weight: 600; color: var(--ink); cursor: pointer;
      background: rgba(255,255,255,.06); border: 1px solid var(--glass-brd);
      padding: 8px 14px; border-radius: 10px; transition: background .15s, transform .05s;
    }
    button:hover, .btn:hover { background: rgba(255,255,255,.12); }
    button:active { transform: translateY(1px); }
    button.primary { background: var(--accent); color: var(--accent-ink); border-color: transparent; }
    button.primary:hover { filter: brightness(1.08); }
    button.ghost { background: transparent; }
    button.danger:hover { background: rgba(242,88,91,.18); border-color: var(--stolen); }

    input, select, textarea {
      font: inherit; color: var(--ink); background: rgba(0,0,0,.28);
      border: 1px solid var(--glass-brd); border-radius: 10px; padding: 8px 11px; width: 100%;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
    select option { background: #141c2a; }
    label { font-size: 11px; font-weight: 600; color: var(--ink-dim); margin-bottom: 4px; display: block; }

    .pill { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px;
      padding: 3px 9px; border-radius: 999px; background: rgba(255,255,255,.08); }
    .pill.normal { color: var(--normal); background: rgba(52,211,153,.14); }
    .pill.lost { color: var(--lost); background: rgba(240,180,41,.16); }
    .pill.stolen { color: var(--stolen); background: rgba(242,88,91,.16); }
    .badge { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .5px;
      color: #0a1420; background: var(--stolen); padding: 1px 7px; border-radius: 999px; vertical-align: middle; }

    /* device switcher */
    .devbtn { display: flex; align-items: center; gap: 10px; width: 100%; text-align: left;
      background: transparent; border: 1px solid transparent; }
    .devbtn:hover { background: rgba(255,255,255,.06); }
    .devbtn.active { background: rgba(56,189,248,.12); border-color: rgba(56,189,248,.35); }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
    .dot.normal { background: var(--normal); } .dot.lost { background: var(--lost); } .dot.stolen { background: var(--stolen); }

    /* panels */
    .panel { width: min(360px, calc(100vw - 32px)); }
    .panel-hd { display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding: 14px 16px; border-bottom: 1px solid var(--glass-brd); }
    .panel-bd { padding: 14px 16px; max-height: 60vh; overflow-y: auto; }
    .panel-bd::-webkit-scrollbar { width: 8px; } .panel-bd::-webkit-scrollbar-thumb { background: rgba(255,255,255,.14); border-radius: 8px; }

    .kv { display: flex; justify-content: space-between; gap: 12px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,.05); }
    .kv:last-child { border-bottom: none; } .kv .k { color: var(--ink-dim); } .kv .v { font-weight: 600; }

    .msg { padding: 8px 11px; border-radius: 10px; margin: 6px 0; max-width: 88%; font-size: 14px; }
    .msg.finder { background: rgba(255,255,255,.07); } .msg.owner { background: rgba(56,189,248,.16); margin-left: auto; }

    .center-wrap { position: fixed; inset: 0; z-index: 20; display: grid; place-items: center; padding: 20px; }
    .seg { display: flex; gap: 6px; background: rgba(0,0,0,.28); padding: 4px; border-radius: 12px; }
    .seg button { flex: 1; padding: 7px 8px; border: none; background: transparent; font-size: 14px; }
    .seg button.on { background: rgba(255,255,255,.12); }
    .seg button.on.lost { color: var(--lost); } .seg button.on.stolen { color: var(--stolen); } .seg button.on.normal { color: var(--normal); }

    .toast-code { font: 700 32px/1 ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: .18em; text-align: center; padding: 10px 0; user-select: all; }
    .spin { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.25); border-top-color: var(--accent); border-radius: 50%; display: inline-block; animation: sp .7s linear infinite; }
    @keyframes sp { to { transform: rotate(360deg); } }
    a { color: var(--accent); }
    .empty { text-align: center; color: var(--ink-dim); padding: 24px 8px; }

    /* map markers */
    .pin { border-radius: 50%; border: 2px solid #0a0f18; box-shadow: 0 0 0 2px rgba(255,255,255,.25); }
    .pin-latest { animation: pulse 2s ease-out infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(242,88,91,.5); } 100% { box-shadow: 0 0 0 16px rgba(242,88,91,0); } }

    .leaflet-popup-content-wrapper { background: var(--glass) !important; color: var(--ink) !important;
      backdrop-filter: blur(18px) saturate(1.3); -webkit-backdrop-filter: blur(18px) saturate(1.3);
      border: 1px solid var(--glass-brd); border-radius: 12px; box-shadow: var(--shadow); }
    .leaflet-popup-tip { background: var(--glass) !important; border: 1px solid var(--glass-brd); }
    .leaflet-popup-content { margin: 12px 14px; font: inherit; }
    .leaflet-popup-close-button { color: var(--ink-dim) !important; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="app"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // --- self-contained mock: hardcoded fake data, no server, no fetch ---
    const h = (html) => { const t = document.createElement('template'); t.innerHTML = html.trim(); return t.content.firstChild; };

    // Austin, TX. Newest-first trail (latest at index 0).
    const CENTER = [30.2672, -97.7431];
    const fixes = [
      { lat: 30.26720, lon: -97.74310, accuracy: 42, batt: 0.63, label: '2m ago' },
      { lat: 30.26845, lon: -97.74060, accuracy: 55, batt: 0.66, label: '19m ago' },
      { lat: 30.27010, lon: -97.73790, accuracy: 61, batt: 0.71, label: '48m ago' },
      { lat: 30.27120, lon: -97.73520, accuracy: 88, batt: 0.74, label: '1h ago' },
    ];

    const map = L.map('map', { zoomControl: true, attributionControl: true }).setView(CENTER, 15);
    const bases = {
      '🌑 Dark': L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '© OpenStreetMap © CARTO', maxZoom: 20, subdomains: 'abcd',
      }),
      '🛰 Satellite': L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Tiles © Esri', maxZoom: 19,
      }),
      '🗺 Streets': L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '© OpenStreetMap © CARTO', maxZoom: 20, subdomains: 'abcd',
      }),
    };
    bases['🌑 Dark'].addTo(map);
    L.control.layers(bases, null, { position: 'bottomright', collapsed: true }).addTo(map);
    const layerGroup = L.layerGroup().addTo(map);

    function markerIcon(latest) {
      const c = latest ? '#f2585b' : '#38bdf8';
      const size = latest ? 20 : 14;
      return L.divIcon({
        className: '', iconSize: [size, size], iconAnchor: [size / 2, size / 2],
        html: `<div class="pin ${latest ? 'pin-latest' : ''}" style="width:${size}px;height:${size}px;background:${c}"></div>`,
      });
    }

    const pts = fixes.map((f) => [f.lat, f.lon]); // newest-first
    L.polyline([...pts].reverse(), { color: '#38bdf8', weight: 2, opacity: 0.5, dashArray: '4 6' }).addTo(layerGroup);

    let latestMarker = null;
    fixes.forEach((f, i) => {
      const latest = i === 0;
      L.circle([f.lat, f.lon], { radius: f.accuracy, color: latest ? '#f2585b' : '#38bdf8', weight: 1, opacity: 0.4, fillOpacity: 0.06 }).addTo(layerGroup);
      const mk = L.marker([f.lat, f.lon], { icon: markerIcon(latest) }).addTo(layerGroup);
      mk.bindPopup(`<div style="min-width:160px">
          <b style="color:${latest ? '#f2585b' : '#38bdf8'}">${latest ? '📍 Latest position' : 'Earlier position'}</b><br>
          <b>banana's Deck</b><br>
          ${f.label}<br>
          Accuracy ±${Math.round(f.accuracy)} m
          <br>Battery ${Math.round(f.batt * 100)}%
        </div>`);
      if (latest) latestMarker = mk;
    });

    // --- floating glass control panel (renderShell) ---
    const app = document.getElementById('app');
    const panel = h(`
      <div class="layer tl glass panel col" style="padding:0">
        <div class="panel-hd">
          <div class="brand"><span class="logo">🛰</span> Find My Deck</div>
          <button class="ghost" title="Sign out">⎋</button>
        </div>
        <div class="panel-bd col">
          <button class="devbtn active">
            <span class="dot normal"></span>
            <span style="flex:1">
              <div style="font-weight:600">banana's Deck</div>
              <div class="faint">seen 2m ago</div>
            </span>
            <span class="pill normal">normal</span>
          </button>

          <div style="height:1px;background:var(--glass-brd);margin:4px 0"></div>

          <div>
            <label>Mode</label>
            <div class="seg">
              <button class="on normal">Normal</button>
              <button>Lost</button>
            </div>
          </div>
          <input placeholder="Message shown to finder (lost mode)">

          <button class="primary" style="width:100%">🔊 Play sound on Deck</button>

          <div class="row">
            <button class="primary" style="flex:1">📍 Locate</button>
            <button style="flex:1">✉ Messages</button>
          </div>

          <button class="ghost danger" style="width:100%">Revoke this Deck</button>

          <div class="glass" style="padding:12px">
            <div class="kv"><span class="k">Fixes plotted</span><span class="v">4</span></div>
            <div class="kv"><span class="k">Latest fix</span><span class="v">±42 m</span></div>
            <div class="kv"><span class="k">Battery</span><span class="v">63%</span></div>
            <div class="kv"><span class="k">Reports</span><span class="v">37</span></div>
          </div>
        </div>
        <div style="padding:12px 16px;border-top:1px solid var(--glass-brd)">
          <button class="primary" style="width:100%">+ Enroll a new Deck</button>
        </div>
      </div>`);
    app.replaceChildren(panel);

    setTimeout(() => { map.invalidateSize(); if (latestMarker) latestMarker.openPopup(); }, 120);
  </script>
</body>
</html>
